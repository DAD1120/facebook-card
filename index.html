<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <script>
        async function fetchJoke() {
            const response = await fetch('https://v2.jokeapi.dev/joke/Any');
            const joke = await response.json();
            const jokeText = joke.type === 'single' ? joke.joke : `${joke.setup} - ${joke.delivery}`;
            document.getElementById('joke').innerText = jokeText;
        }
    </script>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <div id="joke" style="font-size: 20px; margin: 20px;"></div>
    <button onclick="fetchJoke()">Get a Random Joke</button>
</body>
</html>
